apiVersion: v1
kind: Service
metadata:
  name: {{ include "sample-app.fullname" . }}-mysql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  selector:
    {{- include "sample-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
  ports:
    - port: 3306
      targetPort: 3306
